name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Safe, non-secret placeholder values for the Firebase Web SDK config.
      # NEXT_PUBLIC_* Firebase values are not secrets -- they are public
      # identifiers meant to ship in the client bundle, protected by
      # Firestore/Storage Security Rules rather than by being hidden. These
      # placeholders exist only so `next build` has syntactically valid
      # values to inline; they are not connected to any real Firebase
      # project.
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder-api-key"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci-placeholder.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-placeholder.firebasestorage.app"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
      # Phase 1C's /account page imports server code that reaches
      # @/lib/firebase/admin (Admin SDK), so `next build` now evaluates that
      # module during its page-data-collection step even though /account is
      # rendered dynamically at request time -- it genuinely needs *a*
      # syntactically valid credential to construct the Admin app, not just
      # at runtime. This is the same disposable, never-real RSA keypair
      # committed in .env.test (see that file's header for why it's safe to
      # commit) -- it is never connected to any real Google Cloud project
      # and is rejected by real Firebase/Google APIs; it only ever
      # satisfies `cert()`'s local parsing during this build step, which
      # never calls a real Firebase project.
      FIREBASE_PROJECT_ID: "demo-test"
      FIREBASE_CLIENT_EMAIL: "firebase-adminsdk-test@demo-test.iam.gserviceaccount.com"
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQDZvJd7FfxroAq0\niw/9qJOLWUAgFtAvCUw5K+Nw3QcAzgaKm1NgAGAJNGkT1Wol6XAf0Qmln8mwIuch\nOf562Ra71Wi7bb6SCKd8HM1FoenRIx1xyqOAB2ftMF07vwb3zZG9ApoMAKoKk2XM\nmmcvQnmIOXipGhpdwdrrMJTcsbQYGJ5KeVky4CcDKVSYMDnMK82vgfU+B7Gv5GmA\n/X5Hg2YoI56EQZR+4P3i2CRqjEBMAxW3a5HhzMN+ZUnlnbUa2TcEQ2vvS//PumYI\nJrWoAl/rWGGd3y7lxCp7oplJ22WeNCD9zadZH8qCZPhsGUD8XViQacnRAwBaEDN6\nwbWb696vAgMBAAECggEABQuEHQN85kd+iAFi3Pc/d+6Y+EVfDH/0Jqz4J6DPbTrY\n1vRTYbmQgBYZSy7aN0ep4+rVhONnam/cmB3+Yf1OtAp1U0ZvMHYH323RacgfIUvl\nfkH6ONizFUFWH7DE6g/2zQDW7elEB1uz86IuOt+Y7kmanJxwuPRpbKKjCFwLtrUs\nWlEdstb8TwqZnsjkL65wl9SrH3yw2/ZoelvL5KX7L8g3MHgtapsA/nXH/hKlkn7l\nCfkt0oeo2xRVfUmByie6xofNZkACnOOI41MdueVspel0qf6vORJmOPBN4edzr/XF\nH2aBZw5ZEN1xlB/ADhcHRVM8+XBcgN3DlAevEayRyQKBgQD813feJIKo/gklm5cR\nTXjNb1TXda/xLY/IGTSxKdFeSrw0eWxIlfao/pOzMyZXUjFenemKQ28nBgUHxVbq\nS5Ym6CQXQzNeVNe5kiTc6biyttH9OkiKm37dbyj7TtuzYaXfKS7beSHLImUfFMqe\nJA+KIn7LymgRcodZk1e+TYqH+QKBgQDcdN2Rp37ujC36/zWcuUMY0Z+CvYAR/smO\nT2CSX2GkcC0A5ZkLtvFPq+mqefd1+af759J6+0KoD/0IcuKN1oIKwWjDLCdSLTne\n+gKuV2yRFCOAuFREEVoSaFnIxDxfTm7izYSdQAt2yIWh8tuhGgn5MONFZIk9w9VQ\nn83r81HV5wKBgC2tv7oiXnipbH2e3mwB0xFKS8mhOWgZEyDTbPGU3H5sghP429dB\nQI7Hb2ewlfywnLq7TLXt+ObT75S30jwB696bkemh+mXQbijYflBq6TNgVA+rt+9S\nqFjY/E5qsMZ3nb/zcMO13qUUUbCL0Q9A9I3ALagjqSl9x3YnaHK5D44BAoGBAJEO\nTGP0Y+6uSernVe1jcSS5eU1bRxOQJCsBS7fEDslWDiaS7BrrKuiTY1KKoir8NG3p\n4XKONRPEQWf3v944EKTnEfmp6c2GeJegxXbVi1gCekHOB5QqHqwSAVG63UaQoyGU\nvPeDFof39QXUeHMOYRWX91LHjg4X9xnvrFzeYzBtAoGAHLcTi22g1G0GAcrwLIGt\nLx4JbbaEdf6AOeu4EiKPXxkGxjBDkq+O01PcTm3jU6k7HCb0ecCFMwKCxC5NuqzK\ntp5f1G9Gna7watD5T0c2dxDbW5svlvAb7RGKs4zXMo11i/Z6eeVJ1NQj4vtLQu4U\nl+9Tk3q3Zr12m4+tDpZLug4=\n-----END PRIVATE KEY-----\n"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The Firestore/Auth Emulator (used by `npm run test:emulator`) is a
      # Java process; GitHub's ubuntu-latest runner does not ship a JDK by
      # default.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      # Runs the full Vitest suite inside `firebase emulators:exec`, so
      # emulator-backed integration/security-rule tests run for real here
      # (they skip cleanly under plain `npm run test` when no emulator is
      # up). Admin SDK credentials for these tests come from the committed,
      # fake-only .env.test -- never a real secret, see that file's header.
      - run: npm run test:emulator

      - run: npm run build
